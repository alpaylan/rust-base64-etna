# ETNA workload index for rust-base64.
#
# One [[variant]] per injected mutation. Source of truth for variant -> property
# mapping. Every other fact is derivable from the source tree:
#   - ls patches/*.patch                       (patch-based variants)
#   - grep -rn "pub fn property_" src/etna.rs  (property functions)
#   - grep -rn "fn witness_.*_case_" tests/    (witness tests)
#
# Base commit for this workload is HEAD of master on this tree. Every
# etna/<variant> branch is master + exactly one patch applied on top.
#
# Candidates scanned but not chosen:
# - Pre-engine refactor commits (before ~2022) touch APIs that no longer
#   exist (free-function `encode_config`/`decode_config`, `Config` struct,
#   `DecoderReader::new_with_config`, etc.). The post-refactor surface
#   (`Engine`, `GeneralPurpose`, `Alphabet::new`) is what downstream actually
#   calls, so mutations against deleted types are terminally inexpressible.
# - `afd5dd29` ("Fix panic when decoding last symbol"): already covered by
#   extensive unit tests on InvalidLastSymbol; mutation would duplicate an
#   existing deterministic test rather than exercise a PBT invariant.
# - Encoder/decoder SIMD path fixes: the property "encode(decode(x)) == x"
#   is already asserted heavily in the crate's own tests; adding a PBT
#   wrapper would be redundant with minimal additional signal.

name = "rust-base64"
language = "Rust"

[[variant]]
name = "binhex_alphabet_838355e_1"
property = "BinhexAlphabetMatchesSpec"
injection = "patch"
patch = "patches/binhex_alphabet_838355e_1.patch"
source_commit = "838355e0ac5fb8237ec9b96be5edb011bff00275"
witnesses = [
    "witness_binhex_alphabet_matches_spec_case_hello_world",
    "witness_binhex_alphabet_matches_spec_case_full_range",
]
frameworks = ["proptest", "quickcheck", "crabcheck", "hegel"]
files = ["src/alphabet.rs"]

[[variant]]
name = "decoded_len_overflow_fa47981_1"
property = "DecodedLenEstimateDoesNotPanic"
injection = "patch"
patch = "patches/decoded_len_overflow_fa47981_1.patch"
source_commit = "fa47981fd791467183e4c61112b848095aab21ac"
witnesses = [
    "witness_decoded_len_estimate_does_not_panic_case_usize_max",
    "witness_decoded_len_estimate_does_not_panic_case_near_max",
]
frameworks = ["proptest", "quickcheck", "crabcheck", "hegel"]
files = ["src/engine/general_purpose/decode.rs"]
